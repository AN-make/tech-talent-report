<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="version" content="1.0.0">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<title>科技特长生成长规划 - C++学习蓝图</title>
<style>
:root {
  --bg: #0a0b14;
  --bg2: #14152a;
  --card: #1a1c38;
  --card2: #1f2245;
  --border: #2a2d52;
  --text: #e8eaf6;
  --text2: #9da3c7;
  --text3: #6b7199;
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --pink: #ec4899;
  --pink-light: #f9a8d4;
  --blue: #3b82f6;
  --blue-light: #93c5fd;
  --cyan: #06b6d4;
  --cyan-light: #67e8f9;
  --emerald: #10b981;
  --emerald-light: #6ee7b7;
  --amber: #f59e0b;
  --amber-light: #fcd34d;
  --rose: #f43f5e;
  --rose-light: #fda4af;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ====== HEADER BAR ====== */
.top-bar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 28px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(20px);
}
.top-bar .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.top-bar .logo span:nth-child(1) { color: var(--purple-light); }
.top-bar .logo span:nth-child(2) { color: var(--pink-light); }
.top-bar .logo span:nth-child(3) { color: var(--cyan-light); }
.top-bar select, .top-bar input {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.top-bar select:focus, .top-bar input:focus { border-color: var(--purple); }
.top-bar .spacer { flex: 1; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.3); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }

/* ====== REPORT CONTAINER ====== */
.report-wrapper {
  max-width: 900px; margin: 0 auto; padding: 40px 24px 60px;
  background: var(--bg);
}

/* ====== HERO CARD ====== */
.hero {
  background: linear-gradient(135deg, #1a1040 0%, #1a1245 25%, #1a1540 50%, #201040 75%, #1a1035 100%);
  border-radius: 24px; padding: 28px 32px 22px; text-align: center;
  border: 1px solid rgba(124,58,237,0.2);
  position: relative; overflow: hidden;
  margin-bottom: 20px;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(236,72,153,0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.hero .hero-logo {
  position: absolute;
  top: 12px; left: 20px;
  height: 70px;
  opacity: 0.7;
  z-index: 2;
  pointer-events: none;
  filter: none;
  transition: opacity 0.3s;
}
.hero .hero-logo:hover { opacity: 0.9; }
.hero .badge {
  display: inline-block; padding: 3px 14px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  background: rgba(124,58,237,0.15); color: var(--purple-light); margin-bottom: 10px;
  border: 1px solid rgba(124,58,237,0.25);
}
.hero .hero-name {
  font-size: 44px; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #c4b5fd, #f9a8d4, #67e8f9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px; line-height: 1.2;
}
.hero .hero-slogan {
  font-size: 14px; color: var(--text2); font-weight: 400; margin-bottom: 14px;
}
.hero .hero-stats {
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 10px;
}
.hero .stat-item {
  text-align: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 8px 18px;
  min-width: 90px;
  backdrop-filter: blur(4px);
}
.hero .stat-value {
  font-size: 26px; font-weight: 900;
  background: linear-gradient(135deg, var(--purple-light), var(--pink-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.1;
  letter-spacing: -1px;
}
.hero .stat-label {
  font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px;
  margin-top: 3px;
}
.hero .hero-info-chips {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
}
.hero .hero-info-chips .info-chip {
  padding: 5px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
}
.hero .hero-info-chips .info-chip .chip-dot { width: 6px; height: 6px; }
.hero .hero-info-chips .info-chip .chip-label { font-size: 10px; }
.hero .hero-info-chips .info-chip .chip-value { font-size: 12px; }

/* ====== SECTION TITLE ====== */
.section-title {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px; margin-top: 20px;
  font-size: 18px; font-weight: 700;
}
.section-title .s-icon {
  width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

/* ====== CARDS ====== */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
  position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent);
}
.card-accent-purple::before { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
.card-accent-pink::before { background: linear-gradient(90deg, transparent, var(--pink), transparent); }
.card-accent-cyan::before { background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
.card-accent-emerald::before { background: linear-gradient(90deg, transparent, var(--emerald), transparent); }
.card-accent-amber::before { background: linear-gradient(90deg, transparent, var(--amber), transparent); }
.card-accent-purple { border-left: 3px solid var(--purple); }
.card-accent-pink { border-left: 3px solid var(--pink); }
.card-accent-cyan { border-left: 3px solid var(--cyan); }
.card-accent-emerald { border-left: 3px solid var(--emerald); }
.card-accent-amber { border-left: 3px solid var(--amber); }

/* ====== PRAISE BOX ====== */
.praise-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
}
.praise-card {
  background: var(--card2); border-radius: var(--radius-sm); padding: 20px;
  border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.praise-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.praise-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--pink-light), var(--purple-light));
}
.praise-card .p-icon {
  font-size: 28px; margin-bottom: 10px;
}
.praise-card .p-title {
  font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--text);
}
.praise-card .p-desc {
  font-size: 12px; color: var(--text2); line-height: 1.6;
}
.praise-card .p-stars {
  font-size: 14px; margin-top: 10px; letter-spacing: 2px;
}

/* ====== COMBINED EVALUATION ====== */
.combined-evaluation-card {
  border-left: 3px solid var(--pink);
  position: relative;
}
.combined-evaluation-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--pink-light), var(--purple-light));
}
.evaluation-row {
  display: flex; gap: 24px; align-items: stretch;
}
.evaluation-left {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 12px;
}
.evaluation-right {
  flex: 1.2; min-width: 220px;
  display: flex; flex-direction: column; gap: 12px;
  align-items: stretch; justify-content: flex-start;
  padding-left: 20px;
  border-left: 1px solid var(--border);
}
.praise-grid-compact {
  grid-template-columns: repeat(2, 1fr); gap: 10px;
}
.praise-card-compact {
  padding: 12px 14px;
}
.praise-card-compact .p-icon {
  font-size: 22px; margin-bottom: 6px;
}
.praise-card-compact .p-title {
  font-size: 12px; font-weight: 700; margin-bottom: 4px;
}
.praise-card-compact .p-desc {
  font-size: 11px; line-height: 1.5;
}
.praise-card-compact .p-stars {
  font-size: 12px; margin-top: 6px; letter-spacing: 1px;
}
.evaluation-summary {
  padding-top: 14px; padding-bottom: 4px;
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.evaluation-summary-full {
  margin-top: 12px; padding-top: 14px; padding-bottom: 4px;
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.ability-bars-compact { width: 100%; }
.ability-bars-compact .bar-group { margin-bottom: 12px; }
.ability-bars-compact .bar-group .bar-label-row { font-size: 12px; margin-bottom: 5px; }
.ability-bars-compact .bar-track { height: 8px; border-radius: 4px; }
.radar-wrap { display: flex; justify-content: center; }

@media (max-width: 720px) {
  .evaluation-row { flex-direction: column; }
  .evaluation-right { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 16px; }
  .praise-grid-compact { grid-template-columns: repeat(2, 1fr); }
}

/* ====== INFO ROW ====== */
.info-row {
  display: flex; flex-wrap: wrap; gap: 12px;
}
.info-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 30px;
  background: var(--card2); border: 1px solid var(--border);
  font-size: 13px;
}
.info-chip .chip-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.info-chip .chip-label { color: var(--text3); font-size: 11px; }
.info-chip .chip-value { font-weight: 600; }

/* ====== PROGRESS BARS ====== */
.bar-group { margin-bottom: 14px; }
.bar-group .bar-label-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.bar-group .bar-label { font-weight: 600; }
.bar-group .bar-pct { color: var(--text3); font-weight: 500; }
.bar-group .bar-track {
  height: 8px; border-radius: 4px; background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.bar-group .bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* ====== RANGE SLIDER ====== */
#abilityPanel input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.08);
  outline: none;
  cursor: pointer;
}
#abilityPanel input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #7c3aed;
  border: 2px solid #a78bfa;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(124,58,237,0.4);
  transition: transform .15s;
}
#abilityPanel input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}
#abilityPanel input[type="range"]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: #7c3aed; border: 2px solid #a78bfa;
  cursor: pointer; box-shadow: 0 0 8px rgba(124,58,237,0.4);
}
.timeline-v {
  display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px;
  scroll-snap-type: x mandatory;
}
.tl-card {
  min-width: 160px; flex: 1; background: var(--card2); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 20px; text-align: center;
  scroll-snap-align: start; position: relative;
}
.tl-card .tl-phase {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px;
}
.tl-card .tl-icon { font-size: 32px; margin-bottom: 10px; }
.tl-card .tl-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.tl-card .tl-time { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.tl-card .tl-desc { font-size: 11px; color: var(--text2); line-height: 1.5; }
.tl-card .tl-check {
  display: inline-block; width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); margin-top: 10px; cursor: pointer;
  transition: all 0.3s; font-size: 14px; line-height: 24px;
}
.tl-card .tl-check.done {
  background: var(--emerald); border-color: var(--emerald);
}
.tl-card .tl-check.done::after { content: '✓'; color: #fff; }
.tl-arrow {
  display: flex; align-items: center; color: var(--text3); font-size: 20px;
  min-width: 24px; justify-content: center;
}

/* ====== PARENT SECTION ====== */
.parent-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.parent-card {
  background: var(--card2); border-radius: var(--radius-sm); padding: 16px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.parent-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.parent-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.parent-card:nth-child(1)::before { background: linear-gradient(90deg, var(--purple), var(--pink)); }
.parent-card:nth-child(2)::before { background: linear-gradient(90deg, var(--cyan), var(--blue)); }
.parent-card:nth-child(3)::before { background: linear-gradient(90deg, var(--emerald), var(--amber)); }
.parent-card .pc-num {
  font-size: 36px; font-weight: 900;
  background: linear-gradient(135deg, var(--purple-light), var(--pink-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px; line-height: 1;
  opacity: 0.7;
}
.parent-card .pc-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
.parent-card .pc-text { font-size: 12px; color: var(--text2); line-height: 1.8; }

/* ====== TARGET PATH (升学路线) ====== */
.path-flow {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
  padding: 8px 0;
}
.path-node {
  padding: 12px 20px; border-radius: 30px; font-size: 13px; font-weight: 700;
  text-align: center; min-width: 100px;
}
.path-arrow { font-size: 18px; color: var(--text3); }

/* ====== REGION BOX ====== */
.region-box {
  background: linear-gradient(135deg, rgba(6,182,212,0.06), rgba(124,58,237,0.06));
  border: 1px solid rgba(6,182,212,0.15); border-radius: var(--radius);
  padding: 24px; margin-bottom: 20px;
}
.region-box .region-header { font-size: 14px; font-weight: 700; color: var(--cyan-light); margin-bottom: 10px; }
.region-box .region-text { font-size: 13px; color: var(--text); line-height: 1.8; }

/* ====== CUSTOM SELECT (Province) ====== */
.custom-select .cs-trigger {
  padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; font-family: inherit;
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  transition: border-color 0.2s;
}
.custom-select .cs-trigger:hover { border-color: var(--purple); }
.custom-select .cs-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; max-height: 340px; overflow: auto;
  background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
  z-index: 100; margin-top: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.custom-select .cs-search { padding: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card2); z-index: 2; }
.custom-select .cs-search input {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; font-family: inherit; outline: none;
}
.custom-select .cs-letters {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 10px; border-bottom: 1px solid var(--border);
  position: sticky; top: 46px; background: var(--card2); z-index: 2;
}
.custom-select .cs-letters span {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; font-size: 11px; font-weight: 700; color: var(--text2); cursor: pointer;
  background: rgba(255,255,255,0.04); transition: all 0.15s;
}
.custom-select .cs-letters span:hover { background: var(--purple); color: #fff; }
.custom-select .cs-group-title {
  padding: 6px 14px; font-size: 11px; font-weight: 700; color: var(--text3);
  background: rgba(255,255,255,0.03); text-transform: uppercase; letter-spacing: 1px;
}
.custom-select .cs-item {
  padding: 10px 14px; font-size: 13px; color: var(--text); cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s;
}
.custom-select .cs-item:hover { background: rgba(124,58,237,0.12); color: var(--purple-light); }
.custom-select .cs-item.selected { background: rgba(124,58,237,0.2); color: var(--purple-light); font-weight: 600; }

/* ====== MODAL ====== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex;
  align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 28px; width: 90%; max-width: 580px; max-height: 80vh; overflow-y: auto;
}
.modal h3 { font-size: 20px; margin-bottom: 16px; }
.modal label { display: block; font-size: 12px; color: var(--text3); font-weight: 600; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 1px; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--purple); }
.modal .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* ====== STUDENT LIST POPOVER ====== */
.student-list-pop {
  position: absolute; top: 100%; left: 0; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  min-width: 220px; max-height: 300px; overflow-y: auto; z-index: 60;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); margin-top: 4px; display: none;
}
.student-list-pop.show { display: block; }
.student-list-pop .sl-item {
  padding: 10px 16px; cursor: pointer; font-size: 13px; transition: background 0.15s;
  display: flex; justify-content: space-between; align-items: center;
}
.student-list-pop .sl-item:hover { background: var(--card2); }
.student-list-pop .sl-item.active { background: rgba(124,58,237,0.1); color: var(--purple-light); }
.student-list-pop .sl-item .sl-del {
  opacity: 0; font-size: 16px; color: var(--rose); transition: opacity 0.15s;
}
.student-list-pop .sl-item:hover .sl-del { opacity: 1; }

/* ====== FOOTER MESSAGE ====== */
.footer-message {
  text-align: center;
  padding: 24px 20px;
  margin-top: 8px;
  background: var(--card2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.footer-message::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--purple-light), var(--pink-light), transparent);
}
.footer-message-icon {
  font-size: 24px;
  margin-bottom: 6px;
}
.footer-message-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.footer-message-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
}
.footer-message-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--purple-light);

}

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
  .report-wrapper { padding: 20px 14px 40px; }
  .hero { padding: 28px 20px; }
  .hero .hero-name { font-size: 34px; }
  .hero .hero-stats { gap: 16px; }
  .timeline-v { flex-direction: column; }
  .tl-arrow { transform: rotate(90deg); }
}

/* ====== REGION ANALYSIS ====== */
.region-analysis-box {
  background: var(--card2);
  border-radius: var(--radius);
  padding: 24px 28px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.region-analysis-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(6,182,212,0.3), transparent);
}
.region-analysis-icon {
  font-size: 28px;
  flex-shrink: 0;
  margin-top: 2px;
}
.region-analysis-text {
  font-size: 13px;
  line-height: 1.9;
  color: var(--text);
}

/* ====== POLICY IMAGE SECTION ====== */
.policy-img-section {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 20px;
}
.policy-img-title-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}
.policy-img-title-icon {
  font-size: 18px;
}
.policy-img-title-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan-light);
}

/* ====== POLICY IMAGES ====== */
.policy-img-row {
  display: grid;
  gap: 20px;
  padding: 24px;
}
/* 1张图: 单列居中，限制最大宽度 */
.policy-img-row:has(> .policy-img-col:only-child) {
  grid-template-columns: 1fr;
  max-width: 680px;
  margin: 0 auto;
}
/* 2张图: 两列 */
.policy-img-row:has(> .policy-img-col:nth-child(2):last-child) {
  grid-template-columns: repeat(2, 1fr);
}
/* 3张及以上: 两列排列 */
.policy-img-row:has(> .policy-img-col:nth-child(3)) {
  grid-template-columns: repeat(2, 1fr);
}
.policy-img-col {
  min-width: 0;
}
.policy-img-box {
  background: var(--card2);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--border);
  height: 100%;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  transition: transform 0.2s, box-shadow 0.2s;
}
.policy-img-box:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.policy-img-box img {
  display: block;
  width: 100%;
  border-radius: 10px;
  object-fit: contain;
  background: var(--bg);
  min-height: 0;
  border: 1px solid var(--border);
}
/* Responsive: stack on narrow screens */
@media (max-width: 640px) {
  .policy-img-row { grid-template-columns: 1fr !important; padding: 16px; }
  .parent-cards { grid-template-columns: 1fr; }
  .praise-grid { grid-template-columns: 1fr; }
  .praise-grid-compact { grid-template-columns: 1fr; }
  .evaluation-row { flex-direction: column; }
  .evaluation-right { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 16px; }
}

/* PRINT (screenshot mode) */
@media print {
  body { background: #fff; color: #111; }
  .top-bar { display: none; }
  .report-wrapper { max-width: 100%; padding: 20px; }
  .card, .hero, .region-box, .praise-card, .parent-card, .tl-card { background: #fff; border-color: #ddd; break-inside: avoid; }
  .hero .hero-name { -webkit-text-fill-color: #7c3aed; }
  .hero .stat-value { -webkit-text-fill-color: #7c3aed; }
  .tl-check { display: none; }
}

/* Toast */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: #1f2245; color: #e8eaf6; padding: 14px 28px; border-radius: 14px;
  font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s; transform: translateX(-50%) translateY(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,.5); border: 1px solid #2a2d52;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

// ========== DB ==========
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains('s')) e.target.result.createObjectStore('s', { keyPath: 'id', autoIncrement: true }); };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = e => rej(e.target.error);
  });
}
function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('s', 'readonly'); const r = tx.objectStore('s').getAll();
    r.onsuccess = () => res(r.result); r.onerror = e => rej(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('s','readonly').objectStore('s').get(id);
    r.onsuccess = () => res(r.result); r.onerror = e => rej(e.target.error);
  });
}
function dbPut(s) {
  return new Promise((res, rej) => {
    const r = db.transaction('s','readwrite').objectStore('s').put(s);
    r.onsuccess = () => { if (!s.id) s.id = r.result; res(s); };
    r.onerror = e => rej(e.target.error);
  });
}
function dbDel(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('s','readwrite').objectStore('s').delete(id);
    r.onsuccess = () => res(); r.onerror = e => rej(e.target.error);
  });
}

async function init() {
  await openDB();
  setupForms();
  const all = await dbGetAll();
  if (all.length > 0) {
    refreshStudentPopover(all);
    selectStudent(all[0]);
  } else {
    refreshStudentPopover([]);
  }
}

function setupForms() {
  // Modal grade dropdown
  const gSel = qs('#mGrade');
  gSel.innerHTML = DATA.grades.map(g => `<option value="${g.grade}">${g.grade}</option>`).join('');
  // Modal stage
  const sSel = qs('#mStage');
  sSel.innerHTML = DATA.stages.map(s => `<option value="${s}">${s}</option>`).join('');
  // Modal province - hidden select
  const pSel = qs('#mProvince');
  const provinces = [...new Set(DATA.cities.map(c => c.province))].sort();
  pSel.innerHTML = '<option value="">请选择</option>' + provinces.map(p => `<option value="${p}">${p}</option>`).join('');
  // Build custom province dropdown
  buildProvinceDropdown();
}

function buildProvinceDropdown() {
  const letters = Object.keys(PROVINCE_GROUPS).sort();
  el('csProvinceLetters').innerHTML = letters.map(l => `<span onclick="scrollToLetter('${l}')">${l}</span>`).join('');
  let listHtml = '';
  for (const letter of letters) {
    const provinces = PROVINCE_GROUPS[letter];
    listHtml += `<div class="cs-group" data-letter="${letter}"><div class="cs-group-title">${letter}</div>`;
    for (const p of provinces) {
      listHtml += `<div class="cs-item" data-province="${p}" onclick="selectProvince('${p}')">${p}</div>`;
    }
    listHtml += '</div>';
  }
  el('csProvinceList').innerHTML = listHtml;
}
function toggleProvinceDropdown() {
  const dd = el('csProvinceDropdown');
  dd.style.display = dd.style.display === 'none' ? '' : 'none';
  if (dd.style.display !== 'none') {
    el('csProvinceSearch').value = '';
    filterProvinces('');
    setTimeout(() => el('csProvinceSearch').focus(), 50);
    // click outside to close
    setTimeout(() => {
      document.addEventListener('click', function closeDD(e) {
        if (!e.target.closest('#provinceSelectWrap')) {
          dd.style.display = 'none';
          document.removeEventListener('click', closeDD);
        }
      });
    }, 10);
  }
}
function selectProvince(p) {
  el('mProvince').value = p;
  el('csProvinceText').textContent = p || '请选择';
  el('csProvinceDropdown').style.display = 'none';
  // update selected style
  qsa('.cs-item').forEach(item => item.classList.toggle('selected', item.dataset.province === p));
  onModalProvince();
}
function filterProvinces(query) {
  const q = query.trim().toLowerCase();
  qsa('.cs-item').forEach(item => {
    const visible = !q || item.textContent.toLowerCase().includes(q);
    item.style.display = visible ? '' : 'none';
  });
  qsa('.cs-group').forEach(g => {
    const hasVisible = g.querySelector('.cs-item:not([style*="display: none"])');
    g.style.display = hasVisible ? '' : 'none';
  });
}
function scrollToLetter(letter) {
  const group = el('csProvinceList').querySelector(`[data-letter="${letter}"]`);
  if (group) group.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function qs(s) { return document.querySelector(s); }
function qsa(s) { return document.querySelectorAll(s); }
function el(id) { return document.getElementById(id); }

// ========== STUDENT POPOVER ==========
function toggleStudentList() {
  el('studentPop').classList.toggle('show');
}
function refreshStudentPopover(students) {
  const pop = el('studentPop');
  pop.innerHTML = students.map(s => `
    <div class="sl-item ${s.id === currentId ? 'active' : ''}" onclick="selectStudentById(${s.id})">
      <span>${s.name || '未命名'}</span>
      <span class="sl-del" onclick="event.stopPropagation();deleteStudentById(${s.id})">×</span>
    </div>
  `).join('');
  if (currentStudent) {
    el('currentStudentLabel').textContent = currentStudent.name || '未命名';
  } else {
    el('currentStudentLabel').textContent = '选择学生';
  }
  // Close popover on outside click
  setTimeout(() => {
    document.addEventListener('click', function closePop(e) {
      if (!e.target.closest('#studentPop') && !e.target.closest('#studentBtn')) {
        el('studentPop').classList.remove('show');
        document.removeEventListener('click', closePop);
      }
    });
  }, 100);
}

// ========== STUDENT CRUD ==========
async function selectStudentById(id) {
  const s = await dbGet(id);
  if (s) { selectStudent(s); el('studentPop').classList.remove('show'); }
}
async function selectStudent(s) {
  currentId = s.id; currentStudent = { ...s };
  if (!currentStudent.progress) currentStudent.progress = {};
  el('emptyState').style.display = 'none';
  el('reportContent').style.display = '';
  renderReport();
  const all = await dbGetAll();
  refreshStudentPopover(all);
}
async function deleteStudentById(id) {
  if (!confirm('确认删除？')) return;
  await dbDel(id);
  if (currentId === id) { currentId = null; currentStudent = null; el('emptyState').style.display = ''; el('reportContent').style.display = 'none'; }
  const all = await dbGetAll();
  refreshStudentPopover(all);
  if (all.length > 0 && !currentStudent) selectStudent(all[0]);
}

function getRegionEntry() {
  if (!currentStudent) return null;
  // 先精确匹配省份+城市
  const exact = DATA.cities.find(c => c.province === currentStudent.province && c.city === currentStudent.city);
  if (exact) return exact;
  // 回退：用该省份第一个城市的数据
  return DATA.cities.find(c => c.province === currentStudent.province);
}
function getGradeEntry() {
  if (!currentStudent) return null;
  return DATA.grades.find(g => g.grade === currentStudent.grade);
}

function getGradeLevel(grade) {
  const g = grade || '';
  if (['一年级','二年级','三年级','四年级'].includes(g)) return { level: '启蒙黄金期', sub: '脑力开发的最佳窗口', color: 'var(--emerald)', colorLight: 'var(--emerald-light)' };

function getProgressForPhase(student, phaseIndex) {

// 能力维度默认计算
function getDefaultAbilities(s) {
  const r = s.rating || 5;
  return {
    编程基础: Math.min(100, 60 + (r * 8)),
    算法思维: Math.min(100, 40 + (r * 10)),
    竞赛经验: Math.min(100, 30 + (r * 12)),
    数学基础: Math.min(100, 50 + (r * 8)),
    学习态度: Math.min(100, 70 + (r * 6)),
    发展潜力: Math.min(100, 65 + (r * 7)),
  };
}
function getAbilities(s) {
  const defs = getDefaultAbilities(s);
  if (!s.abilities) return defs;
  const a = s.abilities;
  return {
    编程基础: a.编程基础 ?? defs.编程基础,
    算法思维: a.算法思维 ?? defs.算法思维,
    竞赛经验: a.竞赛经验 ?? defs.竞赛经验,
    数学基础: a.数学基础 ?? defs.数学基础,
    学习态度: a.学习态度 ?? defs.学习态度,
    发展潜力: a.发展潜力 ?? defs.发展潜力,
  };
}

function renderRadarSVG(s, size = 260) {
  const a = getAbilities(s);
  const dimensions = [
    { name: '编程基础', score: Math.min(5, a.编程基础 / 20) },
    { name: '算法思维', score: Math.min(5, a.算法思维 / 20) },
    { name: '竞赛经验', score: Math.min(5, a.竞赛经验 / 20) },
    { name: '学习态度', score: Math.min(5, a.学习态度 / 20) },
    { name: '数学基础', score: Math.min(5, a.数学基础 / 20) },
    { name: '发展潜力', score: Math.min(5, a.发展潜力 / 20) },
  ];
  const cx = 130, cy = 130, r = 100, n = dimensions.length;
  const slice = (2 * Math.PI) / n;
  function pt(i, ratio) {
    const a = slice * i - Math.PI / 2;
    return { x: cx + r * ratio * Math.cos(a), y: cy + r * ratio * Math.sin(a) };
  }
  let svg = '';
  // Grid
  for (let lv = 1; lv <= 5; lv++) {
    const pts = [];
    for (let i = 0; i < n; i++) { const p = pt(i, lv/5); pts.push(`${p.x},${p.y}`); }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }
  // Axes
  for (let i = 0; i < n; i++) {
    const p = pt(i, 1);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
  }
  // Data area + points
  const dataPts = dimensions.map((d, i) => pt(i, d.score / 5));
  svg += `<polygon points="${dataPts.map(p => `${p.x},${p.y}`).join(' ')}" fill="rgba(124,58,237,0.15)" stroke="var(--purple)" stroke-width="2"/>`;
  dataPts.forEach(p => {
    svg += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="var(--purple-light)"/><circle cx="${p.x}" cy="${p.y}" r="3" fill="#fff"/>`;
  });
  // Labels
  dimensions.forEach((d, i) => {
    const p = pt(i, 1.25);
    svg += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" fill="var(--text2)" font-size="10" font-weight="600">${d.name}</text>`;
    const p2 = pt(i, 1.10);
    svg += `<text x="${p2.x}" y="${p2.y + 10}" text-anchor="middle" fill="var(--purple-light)" font-size="9" font-weight="700">${d.score.toFixed(1)}/5</text>`;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 260 260">${svg}</svg>`;
}

        }
        // 给所有卡片和 hero 添加明确深色背景，覆盖 border-radius 产生的白色像素
        const cards = clonedDoc.querySelectorAll('.card, .hero, .policy-img-box, .praise-card, .parent-card, .region-analysis-box, .policy-img-section, .footer-message');
        cards.forEach(c => {
          if (c.classList.contains('hero')) {
            c.style.background = '#14152a';
            c.style.backgroundImage = 'none';
            // 用纯色 div 覆盖 hero 的 glow 伪元素，防止截图时出现亮色异常
            const glow = document.createElement('div');
            glow.style.cssText = 'position:absolute;inset:0;background:#14152a;z-index:-1;';
            c.insertBefore(glow, c.firstChild);
          } else if (c.classList.contains('praise-card') || c.classList.contains('parent-card')) {
            c.style.backgroundColor = '#1f2245';
          } else if (c.classList.contains('region-analysis-box') || c.classList.contains('footer-message')) {
            c.style.backgroundColor = '#1f2245';
          } else if (c.classList.contains('policy-img-section')) {
            c.style.backgroundColor = '#1a1c38';
            const titleBar = c.querySelector('.policy-img-title-bar');
            if (titleBar) titleBar.style.backgroundColor = '#1f2245';
          } else {
            c.style.backgroundColor = '#1a1c38';
          }
        });
        // 给 hero logo 添加深色背景色，确保透明PNG在截图中正常显示
        const heroLogos = clonedDoc.querySelectorAll('.hero-logo');
        heroLogos.forEach(l => {
          // 白色logo在深色背景上可见，不需要额外背景色
          l.style.backgroundColor = 'transparent';
        });
        // 固定 grid 布局，防止截图时列数变化导致卡片被压缩
        const parentCards = clonedDoc.querySelectorAll('.parent-cards, .praise-grid, .praise-grid-compact');
        parentCards.forEach(g => {
          if (g.classList.contains('praise-grid-compact')) {
            g.style.gridTemplateColumns = 'repeat(2, 1fr)';
          } else {
            g.style.gridTemplateColumns = 'repeat(3, 1fr)';
          }
        });
        // 固定合并评估区域为横向布局
        const evalRows = clonedDoc.querySelectorAll('.evaluation-row');
        evalRows.forEach(r => { r.style.flexDirection = 'row'; });
        const evalRights = clonedDoc.querySelectorAll('.evaluation-right');
        evalRights.forEach(e => {
          e.style.borderLeft = '1px solid rgba(255,255,255,0.08)';
          e.style.borderTop = 'none';
          e.style.paddingLeft = '20px';
          e.style.paddingTop = '0';
        });

        // 移除所有文字渐变效果（html2canvas 对 -webkit-background-clip:text 支持不佳，会渲染成白色或亮色）
        const gradTexts = clonedDoc.querySelectorAll('.hero-name, .hero-slogan, .stat-value');
        gradTexts.forEach(t => {
          t.style.background = 'none';
          t.style.webkitBackgroundClip = 'initial';
          t.style.webkitTextFillColor = 'initial';
          if (t.classList.contains('hero-name')) t.style.color = '#c4b5fd';
          else if (t.classList.contains('stat-value')) t.style.color = '#c4b5fd';
          else t.style.color = '#e8eaf6';
        });
      }
    });

    // 用深色边框覆盖截图边缘可能残留的白色像素
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#0a0b14';
    ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, canvas.width, canvas.height);

    // Restore UI
    topBar.style.display = '';
    editHints.forEach(b => b.style.display = '');
    el.style.paddingTop = '';
    el.style.backgroundColor = '';

    // Copy to clipboard (优先) + 下载(备选)
    canvas.toBlob(async (blob) => {
      const fileName = `科技特长生规划报告_${currentStudent?.name || 'report'}.png`;
      let clipboardOk = false;
      // 方案1: ClipboardItem (Chrome/Edge/Safari 较新版本)
      if (navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem !== 'undefined') {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          clipboardOk = true;
          showToast('✅ 截图已复制到剪贴板！可直接 Ctrl+V 粘贴到微信/文档');
        } catch (e) {
          console.warn('ClipboardItem write failed:', e);
        }
      }
      // 方案2: 备用 - 同时下载文件，确保用户一定能拿到图片
      if (!clipboardOk) {
        try {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          a.click();
          URL.revokeObjectURL(url);
          showToast('📥 截图已下载（浏览器不支持自动复制，请手动插入图片）');
        } catch (e2) {
          showToast('❌ 截图保存失败，请重试');
        }
      }
    }, 'image/png');
  } catch (e) {
    console.error('Screenshot failed:', e);
    showToast('❌ 截图失败，请重试');
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// ========== IMPORT/EXPORT ==========
async function exportStudents() {
  const all = await dbGetAll();
  if (!all.length) { alert('暂无数据'); return; }
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `科技特长生档案_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importStudents() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const data = JSON.parse(await f.text());
      if (!Array.isArray(data)) { alert('格式错误'); return; }
      let n = 0;
      for (const s of data) { if (s.name) { delete s.id; await dbPut(s); n++; } }
      const all = await dbGetAll();
      refreshStudentPopover(all);
      if (all.length > 0 && !currentStudent) selectStudent(all[0]);
      alert(`成功导入 ${n} 份档案`);
    } catch (err) { alert('导入失败: ' + err.message); }
  };
  inp.click();
}

// ========== START ==========
document.addEventListener('click', e => {
  if (!e.target.closest('#studentPop') && !e.target.closest('#studentBtn')) {
    el('studentPop').classList.remove('show');
  }
});

// Double-click anywhere on report to edit
el('reportContent').addEventListener('dblclick', e => {
  if (currentStudent) showEditStudent();
});

el('modalOverlay').addEventListener('click', e => {
  if (e.target === el('modalOverlay')) closeModal();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.metaKey || e.ctrlKey) {
    if (e.key === 'n') { e.preventDefault(); showNewStudent(); }
    if (e.key === 'e' && currentStudent) { e.preventDefault(); showEditStudent(); }
  }
});

// ========== TOAST ==========
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
